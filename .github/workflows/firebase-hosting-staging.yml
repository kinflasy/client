# This file deploys to Firebase Hosting Preview Channel for staging

name: Deploy to Firebase Hosting - Staging
on:
  push:
    branches:
      - staging
jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    environment:
      name: "staging"
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          cache: true
      - run: flutter pub get
      - run: flutter build web --release -D BASE_URL=${{ vars.BASE_URL }} -D OPENFGA_HOST=${{ vars.OPENFGA_HOST }} -D OPENFGA_STORE_ID=${{ vars.OPENFGA_STORE_ID }} -D OPENFGA_AUTHORIZATION_MODEL_ID=${{ vars.OPENFGA_AUTHORIZATION_MODEL_ID }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KINFLASY_CLIENT }}
          projectId: kinflasy-client
          channelId: staging
