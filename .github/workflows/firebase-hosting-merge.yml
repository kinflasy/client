# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: "pontis / production"
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          cache: true
      - run: flutter pub get
      - run: flutter build web --release --dart-define-from-file=${{ env }}
        env:
          BASE_URL: ${{ env.BASE_URL}}
          OPENFGA_HOST: ${{ env.OPENFGA_HOST}}
          OPENFGA_STORE_ID: ${{ env.OPENFGA_STORE_ID}}
          OPENFGA_AUTHORIZATION_MODEL_ID: ${{ env.OPENFGA_AUTHORIZATION_MODEL_ID}}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KINFLASY_CLIENT }}
          channelId: live
          projectId: kinflasy-client
